name: Patch KINGDOM card menu

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/patch-kingdom-menu.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch index menu
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = 'index.html';
          let text = fs.readFileSync(path, 'utf8');

          if (!text.includes('data-route="kingdomCards"')) {
            text = text.replace(
              '            <a href="/cards/talkcard180/" data-route="talkcard180">톡카드 180 <small>→</small></a>',
              '            <a href="/cards/kingdom/" data-route="kingdomCards">킹덤대화카드 <small>핵심</small></a>\n            <a href="/cards/talkcard180/" data-route="talkcard180">톡카드 180 <small>→</small></a>'
            );
            text = text.replace(
              '          <a href="/cards/talkcard180/" data-route="talkcard180">톡카드 180 <small>→</small></a>',
              '          <a href="/cards/kingdom/" data-route="kingdomCards">킹덤대화카드 <small>핵심</small></a>\n          <a href="/cards/talkcard180/" data-route="talkcard180">톡카드 180 <small>→</small></a>'
            );
            text = text.replace(
              '          <a href="/cards/talkcard180/" data-route="talkcard180">카드도구</a>',
              '          <a href="/cards/kingdom/" data-route="kingdomCards">킹덤대화카드</a>\n          <a href="/cards/talkcard180/" data-route="talkcard180">카드도구</a>'
            );
            text = text.replace(
              '      talkcard180: \'/cards/talkcard180/\',',
              '      kingdomCards: \'/cards/kingdom/\',\n      talkcard180: \'/cards/talkcard180/\','
            );
            text = text.replace('톡카드·Grow·Mindset', '킹덤·톡카드·Grow');
          }

          fs.writeFileSync(path, text);
          NODE
      - name: Commit patch
        run: |
          if git diff --quiet -- index.html; then
            echo "No menu changes needed"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Put KINGDOM card first in card menu"
          git push
