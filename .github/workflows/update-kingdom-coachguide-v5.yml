name: Update KINGDOM coach guide v5

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/update-kingdom-coachguide-v5.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch KINGDOM card coach guide
        run: node .github/scripts/update-kingdom-coachguide-v5.js
      - name: Commit coach guide update
        run: |
          if git diff --quiet -- cards/kingdom/index.html; then
            echo "No KINGDOM coach guide changes needed"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cards/kingdom/index.html
          git commit -m "Update KINGDOM coach guide to v5"
          git push
