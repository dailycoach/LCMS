<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>마음챙김 질문 카드</title>
  <style>
    :root{
      --ink:#14131a;
      --cardText:#14131a;
      --btnText:#14131a;

      --panel: rgba(255,255,255,0.82);
      --stroke: rgba(20,19,26,0.10);
      --shadow: 0 18px 55px rgba(20,19,26,0.10);

      --r24:24px;
      --r28:28px;
      --tap: 52px;

      /* Default theme (calm) */
      --bgA:#f3fbff;
      --bgB:#eef6ff;
      --bgC:#f4fffd;
      --accent:#2563eb;
    }

    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{
      margin:0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo","Noto Sans KR","Malgun Gothic", sans-serif;
      color:var(--ink);
      background:
        radial-gradient(900px 520px at 18% 10%, rgba(37,99,235,0.18), transparent 60%),
        radial-gradient(900px 520px at 86% 6%, rgba(236,72,153,0.10), transparent 60%),
        radial-gradient(900px 520px at 60% 88%, rgba(6,182,212,0.12), transparent 60%),
        linear-gradient(180deg, var(--bgA), var(--bgB) 45%, var(--bgC));
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x:hidden;
    }

    .wrap{
      max-width: 980px;
      margin: 0 auto;
      padding: 18px 16px calc(28px + env(safe-area-inset-bottom));
      min-height: 100%;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .shell{
      width:100%;
      border-radius: var(--r28);
      border: 1px solid var(--stroke);
      background: var(--panel);
      box-shadow: var(--shadow);
      overflow:hidden;
    }

    header{
      padding: 18px 18px 14px;
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
      border-bottom: 1px solid rgba(20,19,26,0.06);
      background:
        radial-gradient(520px 160px at 15% 0%, rgba(255,255,255,0.55), transparent 70%),
        radial-gradient(520px 160px at 85% 0%, rgba(255,255,255,0.40), transparent 70%),
        transparent;
    }

    .brand{ display:flex; flex-direction:column; gap:6px; min-width:0; }
    .title{
      display:flex; align-items:center; gap:10px;
      font-weight: 860;
      letter-spacing:-0.02em;
      font-size: 16px;
      line-height:1.2;
      white-space:nowrap;
    }
    .dot{
      width: 10px; height: 10px; border-radius: 99px;
      background: conic-gradient(from 180deg, var(--accent), rgba(236,72,153,0.92), rgba(6,182,212,0.92), var(--accent));
      box-shadow: 0 10px 18px rgba(20,19,26,0.10);
      flex:0 0 auto;
    }
    .sub{
      margin:0;
      color: rgba(74,70,86,0.90);
      font-size: 12.5px;
      line-height: 1.45;
    }

    .status{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding: 10px 12px;
      border-radius: 999px;
      border: 1px solid rgba(20,19,26,0.10);
      background: rgba(255,255,255,0.78);
      box-shadow: 0 10px 18px rgba(20,19,26,0.06);
      user-select:none;
      white-space:nowrap;
      height: 40px;
      color: rgba(74,70,86,0.95);
      font-size:12.5px;
    }
    .status strong{ color: var(--ink); font-weight:850; }

    .content{ padding: 18px; }

    .stage{
      display:grid;
      grid-template-columns: 1fr;
      gap: 14px;
      align-items:stretch;
    }

    .card{
      border-radius: var(--r28);
      border: 1px solid rgba(20,19,26,0.10);
      overflow:hidden;
      min-height: 360px;
      box-shadow: 0 16px 40px rgba(20,19,26,0.10);
      background:
        radial-gradient(720px 320px at 20% 10%, rgba(255,255,255,0.50), transparent 65%),
        radial-gradient(720px 320px at 85% 0%, rgba(255,255,255,0.35), transparent 70%),
        radial-gradient(720px 320px at 60% 95%, rgba(255,255,255,0.32), transparent 70%),
        linear-gradient(180deg, var(--bgA), var(--bgB) 45%, var(--bgC));
      display:flex;
      align-items:center;
      justify-content:center;
      padding: 18px;
      position:relative;
    }

    .question{
      margin:0;
      width: min(820px, 100%);
      text-align:center;
      color: var(--cardText);
      font-size: clamp(20px, 3.4vw, 32px);
      line-height: 1.55;
      letter-spacing: -0.02em;
      font-weight: 900;
      word-break: keep-all;
    }

    /* 아주 미세한 “카드 느낌” */
    .glow{
      position:absolute;
      inset:-2px;
      pointer-events:none;
      border-radius: var(--r28);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.35);
      opacity: 0.85;
    }

    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
      justify-content:space-between;
    }

    .btn{
      min-height: var(--tap);
      padding: 12px 14px;
      border-radius: 16px;
      border: 1px solid rgba(20,19,26,0.10);
      background: rgba(255,255,255,0.86);
      box-shadow: 0 12px 26px rgba(20,19,26,0.06);
      display:inline-flex;
      align-items:center;
      gap:10px;
      cursor:pointer;
      user-select:none;
      transition: transform .12s ease, box-shadow .12s ease, opacity .12s ease;
      white-space:nowrap;
      color: var(--btnText);
      font-weight: 750;
    }
    .btn:hover{ transform: translateY(-1px); box-shadow: 0 14px 28px rgba(20,19,26,0.10); }
    .btn:active{ transform: translateY(0); }
    .btn:disabled{ opacity:0.55; cursor:not-allowed; transform:none; }

    .btn.primary{
      color:#fff;
      border-color: rgba(20,19,26,0.08);
      background: linear-gradient(135deg, rgba(20,19,26,0.92), rgba(20,19,26,0.78));
      box-shadow: 0 16px 34px rgba(20,19,26,0.16);
    }

    .btnRowRight{ display:flex; gap:10px; flex-wrap:wrap; justify-content:flex-end; }

    /* Idle overlay */
    .idle{
      border-radius: var(--r28);
      border: 1px solid rgba(20,19,26,0.08);
      background: rgba(255,255,255,0.72);
      box-shadow: 0 12px 28px rgba(20,19,26,0.06);
      padding: 18px;
      display:flex;
      flex-direction:column;
      gap: 12px;
      align-items:center;
      text-align:center;
    }
    .idle h2{
      margin: 0;
      font-size: 18px;
      letter-spacing:-0.02em;
      font-weight: 900;
    }
    .idle p{
      margin: 0;
      color: rgba(74,70,86,0.92);
      font-size: 13.5px;
      line-height: 1.55;
    }

    /* Focus */
    :focus-visible{
      outline: 3px solid rgba(20,19,26,0.22);
      outline-offset: 2px;
      border-radius: 14px;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="shell" role="application" aria-label="컬러 질문 카드">

      <header>
        <div class="brand">
          <div class="title"><span class="dot" aria-hidden="true"></span>마음챙김 질문 카드</div>
          <p class="sub">질문에 솔직하게 대답해보세요.</p>
        </div>
        <div class="status" title="진행 상태">
          <span>진행</span> <strong id="progress">0</strong>/<strong id="total">0</strong>
        </div>
      </header>

      <div class="content">
        <div class="stage">

          <div class="card" aria-label="질문 카드">
            <div class="glow" aria-hidden="true"></div>
            <p class="question" id="questionText" style="display:none;"></p>

            <div class="idle" id="idleBox">
              <h2>마음챙김을 시작할까요?</h2>
              <p>
                “다음”을 누를 때마다 <strong>마음챙김을 위한 랜덤 질문</strong>이 한 장씩 나옵니다.<br/>
                (총 120장)
              </p>
              <div style="margin-top:10px;">
                <button class="btn primary" id="btnStart" type="button">시작</button>
              </div>
            </div>
          </div>

          <div class="actions" aria-label="컨트롤">
            <button class="btn" id="btnNext" type="button" disabled>다음</button>
            <div class="btnRowRight">
              <button class="btn" id="btnDone" type="button" disabled>완료</button>
            </div>
          </div>

        </div>
      </div>
    </div>
  </div>

<script>
/* =========================================================
  요구사항 반영
  - 참여자 설정 삭제
  - 답변 입력창 삭제
  - 시작 -> 카드 표시
  - 다음 -> 컬러카드(테마 색) + 질문만 표시
  - 완료 -> 종료(초기 화면 복귀)
  - 질문 반복 완화: "덱(셔플) 방식" + 덱 소진 시 재셔플(최근 N장 회피)
  - 카드: 각 테마당 20개씩
========================================================= */

/* ===== 테마(컬러 톤) ===== */
const THEMES = {
  calm:   { bgA:"#f3fbff", bgB:"#eef6ff", bgC:"#f4fffd", accent:"#2563eb" }, // 진정/불안완화(블루)
  soothe: { bgA:"#fff7fb", bgB:"#f7f2ff", bgC:"#fff0f6", accent:"#ec4899" }, // 위로/자기연민(핑크)
  clear:  { bgA:"#f3fff9", bgB:"#effaf8", bgC:"#f2fbff", accent:"#06b6d4" }, // 명료/정리(시안)
  bold:   { bgA:"#fff7ed", bgB:"#fff1f2", bgC:"#fff7fb", accent:"#f97316" }, // 경계/표현(코랄)
  connect:{ bgA:"#fff7ed", bgB:"#fff4e6", bgC:"#fff7fb", accent:"#fb7185" }, // 관계/연결(피치)
  restore:{ bgA:"#f4fff6", bgB:"#effdf5", bgC:"#f5fbff", accent:"#10b981" }, // 회복/몸(그린)
};

/* ===== UI ===== */
const $ = (id)=>document.getElementById(id);
const questionText = $("questionText");
const idleBox = $("idleBox");
const btnStart = $("btnStart");
const btnNext = $("btnNext");
const btnDone = $("btnDone");
const progress = $("progress");
const total = $("total");

total.textContent = String(CARDS.length);

/* ===== Deck (반복 완화 핵심) =====
   - 덱 생성: 전체 카드 셔플 -> 한 번씩만 나오게(실질적 무반복)
   - 덱 소진 시: 최근 N장(recentWindow)과 겹치지 않도록 재셔플 보정
*/
let deck = [];
let index = 0;
let recent = []; // 최근 카드 id
const recentWindow = 8;

function shuffleInPlace(arr){
  for(let i=arr.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function buildDeckAvoidingRecent(){
  const base = CARDS.slice();
  shuffleInPlace(base);

  // 덱 첫 recentWindow 구간이 최근과 너무 겹치면 몇 번 재셔플
  for(let tries=0; tries<6; tries++){
    const head = base.slice(0, Math.min(recentWindow, base.length)).map(c=>c.id);
    const overlap = head.filter(id=>recent.includes(id)).length;
    if(overlap === 0) break;
    shuffleInPlace(base);
  }
  return base;
}

function applyTheme(themeKey){
  const t = THEMES[themeKey] || THEMES.calm;
  document.documentElement.style.setProperty("--bgA", t.bgA);
  document.documentElement.style.setProperty("--bgB", t.bgB);
  document.documentElement.style.setProperty("--bgC", t.bgC);
  document.documentElement.style.setProperty("--accent", t.accent);

  // 헤더 dot 색감도 theme accent에 자연스럽게 반응
}

function showCard(card){
  applyTheme(card.theme);
  questionText.textContent = card.text;

  // 진행 표시
  progress.textContent = String(Math.min(index, deck.length));
}

function startSession(){
  recent = [];
  deck = buildDeckAvoidingRecent();
  index = 0;

  idleBox.style.display = "none";
  questionText.style.display = "";
  btnNext.disabled = false;
  btnDone.disabled = false;

  nextCard(); // 시작 누르면 즉시 1장
}

function nextCard(){
  // 덱 소진 시 재생성(최근 회피)
  if(index >= deck.length){
    deck = buildDeckAvoidingRecent();
    index = 0;
  }

  const card = deck[index];
  index += 1;

  // 최근 큐 업데이트
  recent.push(card.id);
  if(recent.length > recentWindow) recent = recent.slice(-recentWindow);

  showCard(card);
}

function endSession(){
  // 초기 상태 복귀
  deck = [];
  index = 0;
  recent = [];

  questionText.textContent = "";
  questionText.style.display = "none";
  idleBox.style.display = "";
  btnNext.disabled = true;
  btnDone.disabled = true;
  progress.textContent = "0";

  // 기본 테마로 복귀
  applyTheme("calm");
}

/* ===== Events ===== */
btnStart.addEventListener("click", startSession);
btnNext.addEventListener("click", nextCard);
btnDone.addEventListener("click", endSession);

// 키보드: Space/Enter = Next, Esc = Done
document.addEventListener("keydown",(e)=>{
  if(btnNext.disabled) return;
  if(e.key === "Escape"){
    endSession();
  }else if(e.key === " " || e.key === "Enter"){
    e.preventDefault();
    nextCard();
  }
});
</script>
