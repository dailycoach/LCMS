<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>DAILYCOACHING | KCA 코치 역량 자기진단검사</title>
  <style>
    :root {
      --bg: #f5f2fb;
      --surface: #ffffff;
      --surface-soft: #f8f5ff;
      --text: #241b3a;
      --muted: #6c6282;
      --line: #e6ddf5;
      --primary: #6b4cd6;
      --primary-soft: #efe9ff;
      --accent: #8a6ff0;
      --danger: #cf4f6c;
      --success: #2f8f6a;
      --agree: #3ca370;
      --agree-soft: #e7f6ee;
      --neutral: #9ca1af;
      --disagree: #8a63b3;
      --disagree-soft: #f1eafd;
      --shadow: 0 18px 45px rgba(68, 38, 133, 0.12);
      --radius-lg: 24px;
      --radius-md: 18px;
      --radius-sm: 14px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: linear-gradient(180deg, #f7f3ff 0%, #f2f6ff 100%);
      color: var(--text);
      font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
    }

    body {
      min-height: 100vh;
    }

    .shell {
      max-width: 980px;
      margin: 0 auto;
      padding: 24px 16px 88px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      position: sticky;
      top: 0;
      z-index: 10;
      padding: 10px 0 14px;
      backdrop-filter: blur(10px);
      background: linear-gradient(180deg, rgba(247,243,255,0.96) 0%, rgba(247,243,255,0.84) 100%);
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 2px;
      line-height: 1.1;
    }

    .brand-main {
      font-weight: 900;
      letter-spacing: -0.02em;
      font-size: 1rem;
    }

    .brand-sub {
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 600;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(107, 76, 214, 0.08);
      color: var(--primary);
      font-size: 0.9rem;
      font-weight: 700;
      white-space: nowrap;
    }

    .card {
      background: var(--surface);
      border: 1px solid rgba(107, 76, 214, 0.08);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .hero {
      padding: 28px;
      display: grid;
      gap: 22px;
    }

    .hero h1, .page-title h2, .section-title h3 {
      margin: 0;
      letter-spacing: -0.03em;
    }

    .hero h1 {
      font-size: clamp(1.75rem, 3vw, 2.6rem);
      line-height: 1.15;
    }

    .hero p {
      margin: 0;
      color: var(--muted);
      font-size: 1rem;
    }

    .intro-kicker {
      display: inline-block;
      margin: 10px 0 0;
      color: var(--primary);
      font-size: 0.92rem;
      font-weight: 800;
      letter-spacing: -0.01em;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .mini-panel {
      background: var(--surface-soft);
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      padding: 16px;
    }

    .mini-panel strong {
      display: block;
      margin-bottom: 6px;
      font-size: 0.98rem;
    }

    .mini-panel span {
      color: var(--muted);
      font-size: 0.94rem;
    }

    .scale-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 10px;
    }

    .scale-item {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      padding: 14px 12px;
      text-align: center;
    }

    .scale-item b {
      display: block;
      font-size: 1rem;
      color: var(--primary);
      margin-bottom: 4px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    button {
      appearance: none;
      border: 0;
      cursor: pointer;
      font: inherit;
    }

    .btn {
      min-height: 48px;
      border-radius: 999px;
      padding: 0 18px;
      font-weight: 700;
      transition: transform 0.16s ease, box-shadow 0.16s ease, background 0.16s ease;
    }

    .btn:active {
      transform: translateY(1px);
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: #fff;
      box-shadow: 0 14px 30px rgba(107, 76, 214, 0.28);
    }

    .btn-secondary {
      background: #fff;
      color: var(--text);
      border: 1px solid var(--line);
    }

    .btn-danger {
      background: #fff3f5;
      color: var(--danger);
      border: 1px solid #ffd4de;
    }

    .progress-wrap {
      padding: 18px 20px 0;
    }

    .progress-meta {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      color: var(--muted);
      font-size: 0.95rem;
      margin-bottom: 10px;
    }

    .progress-bar {
      height: 12px;
      background: #ece7f8;
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-value {
      height: 100%;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      border-radius: inherit;
      transition: width 0.2s ease;
    }

    .page {
      padding: 20px;
    }

    .page-title {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 18px;
    }

    .page-title h2 {
      font-size: clamp(1.3rem, 2vw, 1.8rem);
    }

    .page-title p {
      margin: 4px 0 0;
      color: var(--muted);
    }

    .question-list {
      display: grid;
      gap: 14px;
    }

    .question-card {
      border: 1px solid #e1d7f4;
      border-radius: 26px;
      padding: 20px;
      background: linear-gradient(180deg, #ffffff 0%, #fcfbff 100%);
      scroll-margin-top: 120px;
      transition: border-color 0.18s ease, box-shadow 0.18s ease, transform 0.18s ease;
    }

    .question-card.is-complete {
      border-color: rgba(60, 163, 112, 0.32);
      box-shadow: 0 10px 22px rgba(60, 163, 112, 0.08);
    }

    .question-card.active-focus {
      border-color: rgba(107, 76, 214, 0.34);
      box-shadow: 0 0 0 4px rgba(107, 76, 214, 0.08), 0 12px 28px rgba(107, 76, 214, 0.10);
      transform: translateY(-1px);
    }

    .question-head {
      display: grid;
      gap: 12px;
      margin-bottom: 16px;
    }

    .question-head-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .question-number {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 38px;
      height: 38px;
      border-radius: 999px;
      background: var(--surface-soft);
      border: 1px solid var(--line);
      color: var(--primary);
      font-weight: 800;
      font-size: 0.98rem;
      transition: all 0.18s ease;
    }

    .question-card.is-complete .question-number {
      background: #eaf7f0;
      color: var(--success);
      border-color: rgba(47, 143, 106, 0.22);
    }

    .completion-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 10px;
      border-radius: 999px;
      background: #f7f4ff;
      border: 1px solid #e6ddf5;
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 700;
    }

    .completion-badge.done {
      background: #eef8f3;
      border-color: #cfe9db;
      color: var(--success);
    }

    .question-card h4 {
      margin: 0;
      font-size: 1.1rem;
      font-weight: 800;
      letter-spacing: -0.024em;
      line-height: 1.5;
    }

    .likert-wrap {
      display: grid;
      gap: 12px;
      padding: 14px;
      border-radius: 20px;
      background: #faf8ff;
      border: 1px solid #ece3fb;
    }

    .choice-row {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 14px;
    }

    .mobile-poles {
      display: none;
      justify-content: space-between;
      gap: 12px;
      font-size: 0.9rem;
      font-weight: 800;
    }

    .mobile-poles .agree { color: var(--agree); }
    .mobile-poles .disagree { color: var(--disagree); }

    .likert-side {
      font-size: 0.95rem;
      font-weight: 700;
      white-space: nowrap;
    }

    .likert-side.agree {
      color: var(--agree);
    }

    .likert-side.disagree {
      color: var(--disagree);
      text-align: right;
    }

    .choice-scale {
      min-width: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .choice-btn {
      appearance: none;
      border: 0;
      background: transparent;
      padding: 0;
      width: 56px;
      height: 56px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
      position: relative;
      transition: transform 0.15s ease, filter 0.15s ease, opacity 0.15s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .choice-btn:hover {
      transform: translateY(-1px) scale(1.02);
    }

    .choice-btn:focus-visible {
      outline: 3px solid rgba(107, 76, 214, 0.18);
      outline-offset: 3px;
    }

    .choice-btn::before {
      content: '';
      width: 100%;
      height: 100%;
      border-radius: 999px;
      border: 3px solid currentColor;
      background: #fff;
      box-sizing: border-box;
      transition: background 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease;
    }

    .choice-btn::after {
      content: '✓';
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 1rem;
      color: transparent;
      transition: color 0.15s ease, transform 0.15s ease;
      transform: scale(0.8);
    }

    .choice-btn.score-5,
    .choice-btn.score-4 {
      color: var(--agree);
    }

    .choice-btn.score-3 {
      color: var(--neutral);
    }

    .choice-btn.score-2,
    .choice-btn.score-1 {
      color: var(--disagree);
    }

    .choice-btn.score-5,
    .choice-btn.score-1 {
      width: 60px;
      height: 60px;
    }

    .choice-btn.score-4,
    .choice-btn.score-2 {
      width: 52px;
      height: 52px;
    }

    .choice-btn.score-3 {
      width: 42px;
      height: 42px;
    }

    .choice-btn.active.score-5::before,
    .choice-btn.active.score-4::before {
      background: var(--agree-soft);
      box-shadow: inset 0 0 0 10px currentColor, 0 8px 18px rgba(60, 163, 112, 0.18);
    }

    .choice-btn.active.score-3::before {
      background: #eff1f5;
      box-shadow: inset 0 0 0 7px currentColor, 0 8px 18px rgba(156, 161, 175, 0.18);
    }

    .choice-btn.active.score-2::before,
    .choice-btn.active.score-1::before {
      background: var(--disagree-soft);
      box-shadow: inset 0 0 0 10px currentColor, 0 8px 18px rgba(138, 99, 179, 0.18);
    }

    .choice-btn.active {
      transform: scale(1.05);
    }

    .choice-btn.active::after {
      color: #fff;
      transform: scale(1);
    }

    .choice-hint {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      color: #5f5675;
      font-size: 0.84rem;
      padding: 0 88px;
      font-weight: 700;
    }

    .choice-hint span {
      flex: 1;
      text-align: center;
      line-height: 1.25;
    }

    .footer-nav {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-top: 22px;
      flex-wrap: wrap;
    }

    .footer-nav .group {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
      margin-bottom: 18px;
    }

    .stat-box {
      background: var(--surface-soft);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px;
    }

    .stat-box small {
      color: var(--muted);
      display: block;
      margin-bottom: 8px;
    }

    .stat-box strong {
      font-size: 1.4rem;
      display: block;
      letter-spacing: -0.03em;
    }

    .result-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.15fr) minmax(0, 0.85fr);
      gap: 18px;
      align-items: start;
    }

    .section-card {
      border: 1px solid var(--line);
      border-radius: 22px;
      background: #fff;
      padding: 18px;
    }

    .section-title {
      margin-bottom: 14px;
    }

    .section-title h3 {
      font-size: 1.1rem;
    }

    .section-title p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 0.94rem;
    }

    .score-list {
      display: grid;
      gap: 10px;
    }

    .score-item {
      display: grid;
      grid-template-columns: minmax(0, 120px) minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
    }

    .score-item .label {
      font-weight: 700;
      font-size: 0.95rem;
    }

    .bar {
      width: 100%;
      height: 12px;
      background: #eee8fb;
      border-radius: 999px;
      overflow: hidden;
    }

    .bar > span {
      display: block;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #7a61e1, #9f8bfa);
    }

    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 12px;
      border-radius: 999px;
      background: var(--surface-soft);
      border: 1px solid var(--line);
      font-size: 0.93rem;
      font-weight: 700;
    }

    .tag.good { color: var(--success); }
    .tag.bad { color: var(--danger); }

    textarea {
      width: 100%;
      min-height: 92px;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      font: inherit;
      color: var(--text);
      background: #fff;
      resize: vertical;
    }

    .note-grid {
      display: grid;
      gap: 12px;
    }

    .note-item {
      background: #ffffff;
      border: 1px solid #e8def7;
      border-radius: 18px;
      padding: 14px;
    }

    .note-item strong {
      display: block;
      margin-bottom: 8px;
    }

    .low-item-list {
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }

    .result-hero {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 18px;
      margin-bottom: 18px;
    }

    .metric-hero {
      border-radius: 24px;
      padding: 22px;
      background: linear-gradient(135deg, #6b4cd6 0%, #8d71f0 100%);
      color: #fff;
      box-shadow: 0 20px 40px rgba(107, 76, 214, 0.22);
    }

    .metric-hero small {
      display: block;
      opacity: 0.82;
      margin-bottom: 8px;
    }

    .metric-hero strong {
      display: block;
      font-size: clamp(2rem, 5vw, 3rem);
      line-height: 1;
      letter-spacing: -0.04em;
      margin-bottom: 12px;
    }

    .metric-hero .sub {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .metric-hero .sub span {
      background: rgba(255,255,255,0.14);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 999px;
      padding: 8px 12px;
      font-weight: 700;
      font-size: 0.92rem;
    }

    .summary-card {
      background: #fff;
      border: 1px solid #e7def7;
      border-radius: 24px;
      padding: 18px;
      display: grid;
      gap: 12px;
    }

    .summary-block {
      padding: 12px 14px;
      border-radius: 18px;
      background: #faf8ff;
      border: 1px solid #ece3fb;
    }

    .summary-block strong {
      display: block;
      margin-bottom: 6px;
      font-size: 0.95rem;
    }

    .revisit-stack {
      display: grid;
      gap: 14px;
      margin-top: 6px;
    }

    .revisit-card {
      padding: 16px;
      border-radius: 20px;
      border: 1px solid #e8def7;
      background: #fcfbff;
    }

    .revisit-card h4 {
      margin: 0 0 6px;
      font-size: 1rem;
      letter-spacing: -0.02em;
    }

    .low-item {
      border-radius: 16px;
      background: #fff8fa;
      border: 1px solid #ffd9e1;
      padding: 12px 14px;
      font-size: 0.94rem;
    }

    .low-item b {
      color: var(--danger);
    }

    .prompt-list {
      display: grid;
      gap: 8px;
      margin-top: 12px;
    }

    .prompt-item {
      border-radius: 14px;
      background: #f8f5ff;
      border: 1px solid #ddd3f4;
      padding: 12px 14px;
      font-size: 0.94rem;
      color: var(--text);
    }

    .prompt-item b {
      color: var(--primary);
    }

    .empty-state {
      padding: 18px;
      border-radius: 18px;
      background: #f8fbff;
      border: 1px dashed #c9d9f7;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .helper {
      color: var(--muted);
      font-size: 0.92rem;
    }


    .feedback-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin-top: 18px;
    }

    .feedback-card {
      border: 1px solid var(--line);
      border-radius: 20px;
      background: #fff;
      padding: 16px;
    }

    .feedback-card h4 {
      margin: 0 0 8px;
      font-size: 1rem;
      letter-spacing: -0.02em;
    }

    .feedback-card p {
      margin: 0;
      color: var(--muted);
      font-size: 0.94rem;
      line-height: 1.6;
    }

    .feedback-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 10px;
      padding: 7px 10px;
      border-radius: 999px;
      font-size: 0.82rem;
      font-weight: 800;
      border: 1px solid transparent;
    }

    .feedback-badge.strong {
      color: var(--success);
      background: #eef8f3;
      border-color: #cfe9db;
    }

    .feedback-badge.stable {
      color: var(--primary);
      background: #f5f1ff;
      border-color: #dfd3fa;
    }

    .feedback-badge.focus {
      color: var(--danger);
      background: #fff4f7;
      border-color: #ffd6df;
    }

    .print-summary {
      display: none;
      margin-bottom: 18px;
      padding: 18px;
      border: 1px solid #d9d1ea;
      border-radius: 18px;
      background: #fff;
    }

    .print-summary h3 {
      margin: 0 0 8px;
      font-size: 1.2rem;
      letter-spacing: -0.03em;
    }

    .print-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 14px;
      color: #5e5872;
      font-size: 0.9rem;
      margin-bottom: 10px;
    }

    .print-summary p {
      margin: 0;
      color: #3e3558;
      font-size: 0.95rem;
      line-height: 1.6;
    }

    .hidden {
      display: none !important;
    }

    .center {
      text-align: center;
    }

    .print-only {
      display: none;
    }

    .svg-wrap {
      width: 100%;
      aspect-ratio: 1;
      border-radius: 22px;
      background: linear-gradient(180deg, #faf8ff 0%, #f5f8ff 100%);
      border: 1px solid var(--line);
      padding: 10px;
    }

    .svg-wrap svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    @media (max-width: 820px) {
      .hero-grid,
      .result-grid,
      .stats-grid,
      .result-hero {
        grid-template-columns: 1fr;
      }

      .score-item {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {
      .shell {
        padding-left: 12px;
        padding-right: 12px;
      }

      .hero,
      .page,
      .progress-wrap {
        padding-left: 16px;
        padding-right: 16px;
      }

      .scale-grid {
        grid-template-columns: 1fr;
      }

      .question-card {
        padding: 16px 14px;
        scroll-margin-top: 88px;
      }

      .choice-row {
        grid-template-columns: 1fr;
        gap: 10px;
      }

      .mobile-poles {
        display: flex;
      }

      .likert-side {
        display: none;
      }

      .choice-scale {
        gap: 8px;
      }

      .choice-btn.score-5,
      .choice-btn.score-1 {
        width: 52px;
        height: 52px;
      }

      .choice-btn.score-4,
      .choice-btn.score-2 {
        width: 46px;
        height: 46px;
      }

      .choice-btn.score-3 {
        width: 38px;
        height: 38px;
      }

      .choice-hint {
        padding: 0;
        font-size: 0.75rem;
        gap: 4px;
      }

      .metric-hero,
      .summary-card {
        padding: 18px;
      }

    const FEEDBACK_TONE = {
      strong: '강점',
      stable: '유지·확장',
      focus: '집중 보완'
    };

    // ==============================
    // DOM / Runtime State
    // ==============================
    const DOM = {
      app: document.getElementById('app'),
      autosaveStatus: document.getElementById('autosave-status')
    };
    const state = loadState();

    render();

    function createDefaultNotes() {
      return NOTE_FIELDS.reduce((accumulator, field) => {
        accumulator[field] = '';
        return accumulator;
      }, {});
    }

    function defaultState() {
      return {
        screen: 'intro',
        sectionIndex: 0,
        answers: {},
        notes: createDefaultNotes()
      };
    }

    function loadState() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null');
        const base = getEmptyState();
        return saved ? { ...base, ...saved, notes: { ...base.notes, ...(saved.notes || {}) } } : base;
      } catch (error) {
        return getEmptyState();
      }
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      DOM.autosaveStatus.textContent = '자동 저장 완료';
      clearTimeout(saveState._t);
      saveState._t = setTimeout(() => {
        DOM.autosaveStatus.textContent = '자동 저장 켜짐';
      }, 1200);
    }

    function setState(patch) {
      Object.assign(state, patch);
      saveState();
      render();
    }

    function totalQuestionCount() {
      return FLAT_QUESTIONS.length;
    }

    function answeredCount() {
      return Object.keys(state.answers).length;
    }

    function getQuestionKey(categoryId, itemIndex) {
      return `${categoryId}-${itemIndex}`;
    }

    function getScoreToneLabel(score) {
      return SCORE_TONE_LABELS[score] || '';
    }

    // ==============================
    // User Actions
    // ==============================
    function updateAnswer(categoryId, itemIndex, value) {
      state.answers[getQuestionKey(categoryId, itemIndex)] = value;
      saveState();
      render();
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          scrollToNextQuestion(categoryId, itemIndex);
        });
      });
    }

    function clearAll() {
      if (!window.confirm('응답과 메모를 모두 지울까요?')) return;
      localStorage.removeItem(STORAGE_KEY);
      Object.assign(state, getEmptyState());
      render();
    }

    function startTest() {
      setState({ screen: 'test', sectionIndex: 0 });
    }

    function goSection(direction) {
      const nextIndex = state.sectionIndex + direction;
      if (nextIndex < 0 || nextIndex >= CATEGORIES.length) return;
      setState({ sectionIndex: nextIndex });
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function scrollToNextQuestion(categoryId, itemIndex) {
      if (state.screen !== 'test') return;
      const nextQuestion = document.querySelector(`[data-question-card="${categoryId}-${itemIndex + 1}"]`);
      const fallbackTarget = document.getElementById('next-btn') || document.getElementById('finish-btn');
      const target = nextQuestion || fallbackTarget;
      if (!target) return;

      document.querySelectorAll('.question-card.active-focus').forEach(card => card.classList.remove('active-focus'));
      if (nextQuestion) nextQuestion.classList.add('active-focus');

      const rect = target.getBoundingClientRect();
      const currentScroll = window.pageYOffset || document.documentElement.scrollTop || 0;
      const desiredOffset = window.innerWidth <= 768
        ? Math.max(110, window.innerHeight * 0.28)
        : 132;
      const targetTop = rect.top + currentScroll - desiredOffset;
      window.scrollTo({ top: Math.max(0, targetTop), behavior: 'smooth' });
    }

    function finishTest() {
      if (answeredCount() < totalQuestionCount()) {
        const ok = window.confirm('아직 답하지 않은 문항이 있습니다. 결과 화면으로 이동할까요?');
        if (!ok) return;
      }
      setState({ screen: 'result' });
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function backToIntro() {
      setState({ screen: 'intro' });
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function backToTest() {
      setState({ screen: 'test' });
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    
    // ==============================
    // Rendering
    // ==============================
    function render() {
      if (state.screen === 'intro') {
        renderIntro();
        return;
      }
      if (state.screen === 'test') {
        renderTest();
        return;
      }
      renderResult();
    }

    // ==============================
    // Scoring / Results
    // ==============================
    function calculateResults() {
      const categories = CATEGORIES.map(category => {
        const itemDetails = category.items.map((text, index) => {
          const score = Number(state.answers[getQuestionKey(category.id, index)] || 0);
          return { index: index + 1, text, score };
        });
        const score = itemDetails.reduce((sum, item) => sum + item.score, 0);
        const lowItems = itemDetails.filter(item => item.score > 0 && item.score <= 2);
        const answeredItems = itemDetails.filter(item => item.score > 0);
        const lowestAnsweredScore = answeredItems.length
          ? Math.min(...answeredItems.map(item => item.score))
          : 0;
        const revisitItems = lowItems.length
          ? lowItems
          : answeredItems.filter(item => item.score === lowestAnsweredScore);
        const revisitMode = lowItems.length
          ? 'low-score'
          : answeredItems.length
            ? 'relative-low-score'
            : 'no-answer';

        return {
          id: category.id,
          group: category.group,
          name: category.name,
          description: category.description,
          score,
          average: Number((score / category.items.length).toFixed(2)),
          itemDetails,
          lowItems,
          lowestAnsweredScore,
          revisitItems,
          revisitMode
        };
      });

      const sortedDesc = [...categories].sort((a, b) => b.score - a.score || a.id - b.id);
      const sortedAsc = [...categories].sort((a, b) => a.score - b.score || a.id - b.id);
      const total = categories.reduce((sum, category) => sum + category.score, 0);
      return {
        categories,
        sortedDesc,
        sortedAsc,
        top3: sortedDesc.slice(0, 3),
        low3: sortedAsc.slice(0, 3),
        total,
        average: Number((total / totalQuestionCount()).toFixed(2))
      };
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function renderPromptList(categoryId) {
      const prompts = IMPROVEMENT_PROMPTS[categoryId] || [];
      if (!prompts.length) return '';
      return `

          ${prompts.map((prompt, index) => `
            <div class="prompt-item"><b>권장 개선 질문 ${index + 1}</b><br>${prompt}</div>
          `).join('')}
        </div>
      `;
    }

    function renderRadar(categories) {
      const size = 520;
      const center = size / 2;
      const radius = 175;
      const steps = RADAR_STEPS;
      const maxScore = CATEGORY_MAX_SCORE;

      const labels = categories.map(category => category.name);
      const points = categories.map((category, index) => {
        const angle = (-Math.PI / 2) + (Math.PI * 2 * index / categories.length);
        const valueRadius = radius * (category.score / maxScore);
        return {
          x: center + Math.cos(angle) * valueRadius,
          y: center + Math.sin(angle) * valueRadius,
          angle,
          labelX: center + Math.cos(angle) * (radius + 32),
          labelY: center + Math.sin(angle) * (radius + 32),
          label: labels[index]
        };
      });

      const polygonPoints = points.map(point => `${point.x},${point.y}`).join(' ');

      const rings = Array.from({ length: steps }, (_, index) => {
        const ringRadius = radius * ((index + 1) / steps);
        const ringPoints = categories.map((_, itemIndex) => {
          const angle = (-Math.PI / 2) + (Math.PI * 2 * itemIndex / categories.length);
          return `${center + Math.cos(angle) * ringRadius},${center + Math.sin(angle) * ringRadius}`;
        }).join(' ');
        return `<polygon points="${ringPoints}" fill="none" stroke="#ddd3f4" stroke-width="1"></polygon>`;
      }).join('');

      const axes = categories.map((_, index) => {
        const angle = (-Math.PI / 2) + (Math.PI * 2 * index / categories.length);
        return `<line x1="${center}" y1="${center}" x2="${center + Math.cos(angle) * radius}" y2="${center + Math.sin(angle) * radius}" stroke="#ddd3f4" stroke-width="1"></line>`;
      }).join('');

      const labelsSvg = points.map(point => `
        <text x="${point.labelX}" y="${point.labelY}" font-size="15" font-weight="700" fill="#5f5675" text-anchor="middle" dominant-baseline="middle">${escapeHtml(point.label)}</text>
      `).join('');

      const ticks = Array.from({ length: steps }, (_, index) => {
        const value = (maxScore / steps) * (index + 1);
        const y = center - (radius * ((index + 1) / steps));
        return `<text x="${center + 6}" y="${y - 4}" font-size="11" fill="#8d84a3">${value}</text>`;
      }).join('');

      return `
        <svg viewBox="0 0 ${size} ${size}" role="img" aria-label="영역별 점수 레이더 차트">
          ${rings}
          ${axes}
          <polygon points="${polygonPoints}" fill="rgba(107, 76, 214, 0.16)" stroke="#6b4cd6" stroke-width="3"></polygon>
          ${points.map(point => `<circle cx="${point.x}" cy="${point.y}" r="4" fill="#6b4cd6"></circle>`).join('')}
          ${labelsSvg}
          ${ticks}
        </svg>
      `;
    }

    function updateNote(field, value) {
      state.notes[field] = value;
      saveState();
    }

    function renderReasonInputs(title, targets, fieldPrefix) {
      return `
        <div class="section-card">
          <div class="section-title">
            <h3>${title}</h3>
            <p>강점과 보완점의 이유를 짧게 적어보며 현재의 코칭 습관을 해석해보세요.</p>
          </div>
          <div class="note-grid">
            ${targets.map((target, index) => `
              <div class="note-item">
                <strong>(${index + 1}) ${target.name} · ${target.score}점</strong>
                <textarea data-note="${fieldPrefix}${index + 1}" placeholder="이 점수가 나온 이유를 간단히 적어보세요.">${escapeHtml(state.notes[`${fieldPrefix}${index + 1}`] || '')}</textarea>
              </div>
            `).join('')}
          </div>
        </div>
      `;
    }

    function renderResultHero(result, completion) {
      return `
        <div class="result-hero">
          <div class="metric-hero">
            <small>전체 코치 역량 한눈에 보기</small>
            <strong>${result.total}점</strong>
            <div class="sub">
              <span>문항 평균 ${result.average}점</span>
              <span>응답 ${answeredCount()} / ${totalQuestionCount()}</span>
              <span>완료율 ${completion}%</span>
            </div>
          </div>
          <div class="summary-card">
            <div class="summary-block">
              <strong>강점 3개</strong>
              <div class="tag-list">
                ${result.top3.map(item => `<div class="tag good">${item.group} · ${item.name} · ${item.score}점</div>`).join('')}
              </div>
            </div>
            <div class="summary-block">
              <strong>보완점 3개</strong>
              <div class="tag-list">
                ${result.low3.map(item => `<div class="tag bad">${item.group} · ${item.name} · ${item.score}점</div>`).join('')}
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function renderScoreSection(result) {
      return `
        <div class="result-grid">
          <div class="section-card">
            <div class="section-title">
              <h3>영역별 점수</h3>
              <p>영역당 최대 ${CATEGORY_MAX_SCORE}점입니다.</p>
            </div>
            <div class="score-list">
              ${result.categories.map(category => `
                <div class="score-item">
                  <div class="label">(${category.id}) ${category.name}</div>
                  <div class="bar"><span style="width:${(category.score / CATEGORY_MAX_SCORE) * 100}%"></span></div>
                  <div><strong>${category.score}</strong> / ${CATEGORY_MAX_SCORE}</div>
                </div>
              `).join('')}
            </div>
          </div>

          <div class="section-card">
            <div class="section-title">
              <h3>레이더 차트</h3>
              <p>8개 코칭역량의 균형을 한눈에 볼 수 있게 구성했습니다.</p>
            </div>
            <div class="svg-wrap">${renderRadar(result.categories)}</div>
          </div>
        </div>
      `;
    }

    function renderRevisitCard(category) {
      return `
        <div class="revisit-card">
          <h4>${category.name}</h4>
          ${category.revisitMode === 'low-score'
            ? `<div class="helper" style="margin-bottom:10px;">이 역량에서 1점 또는 2점으로 응답한 문항입니다.</div>`
            : category.revisitMode === 'relative-low-score'
              ? `<div class="helper" style="margin-bottom:10px;">1점 또는 2점 문항은 없어서, 이 역량에서 가장 낮게 응답한 ${category.lowestAnsweredScore}점 문항을 보여드립니다.</div>`
              : '<div class="empty-state">아직 이 역량에 응답한 문항이 없습니다.</div>'}
          ${category.revisitMode !== 'no-answer'
            ? `<div class="low-item-list">${category.revisitItems.map(item => `
                <div class="low-item"><b>${item.score}점</b> · ${item.index}. ${item.text}</div>
              `).join('')}</div>`
            : ''}
          ${renderPromptList(category.id)}
        </div>
      `;
    }

    function renderRevisitSection(result) {
      return `
        <div class="section-card" style="margin-top:18px;">
          <div class="section-title">
            <h3>보완이 필요한 역량 다시 보기</h3>
            <p>1점·2점 문항이 없더라도 각 보완 역량 안에서 상대적으로 가장 낮았던 문항을 보여주어 개발 포인트를 놓치지 않게 했습니다.</p>
          </div>
          <div class="revisit-stack">
            ${result.low3.map(category => renderRevisitCard(category)).join('')}
          </div>

          <div class="note-item" style="margin-top:14px;">
            <strong>나의 역량 개발 실행계획</strong>
            <textarea id="improvement-note" placeholder="다음 세션 전까지 실천해볼 구체적인 개발 행동을 적어보세요.">${escapeHtml(state.notes.improvement || '')}</textarea>
          </div>
        </div>
      `;
    }

    function getFeedbackTone(category) {
      if (category.average >= 4.2) return 'strong';
      if (category.average >= 3.2) return 'stable';
      return 'focus';
    }

    function renderAutoFeedbackSection(result) {
      return `
        <div class="section-card" style="margin-top:18px;">
          <div class="section-title">
            <h3>자동 해석 피드백</h3>
            <p>현재 점수를 바탕으로 역량별 해석 문장을 자동으로 제공합니다.</p>
          </div>
          <div class="feedback-grid">
            ${result.categories.map(renderAutoFeedbackCard).join('')}
          </div>
        </div>
      `;
    }

    function renderAutoFeedbackCard(category) {
      const tone = getFeedbackTone(category);
      const feedback = AUTO_FEEDBACK[category.id]?.[tone] || '';
      return `
        <div class="feedback-card">
          <div class="feedback-badge ${tone}">${FEEDBACK_TONE[tone]}</div>
          <h4>${category.group} · ${category.name}</h4>
          <p>${feedback}</p>
        </div>
      `;
    }

    function renderPrintSummary(result, completion) {
      const printedAt = new Date().toLocaleString('ko-KR', {
        year: 'numeric',
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit'
      });
      const strongest = result.top3[0];
      const weakest = result.low3[0];
      return `
        <div class="print-summary print-only">
          <h3>KCA 코치 역량 자기진단검사 결과 요약</h3>
          <div class="print-meta">
            <span>출력 일시 ${printedAt}</span>
            <span>총점 ${result.total}점</span>
            <span>문항 평균 ${result.average}점</span>
            <span>응답률 ${completion}%</span>
          </div>
          <p>현재 결과에서 가장 두드러진 강점은 <b>${strongest ? strongest.name : '-'}</b>이며, 우선 보완이 필요한 영역은 <b>${weakest ? weakest.name : '-'}</b>입니다. 아래 출력물은 현재 응답을 바탕으로 한 자기진단 결과 요약입니다.</p>
        </div>
      `;
    }

    function renderResultFooter() {
      return `
        <div class="footer-nav no-print">
          <div class="group">
            <button class="btn btn-secondary" id="back-test-btn">응답 화면으로</button>
            <button class="btn btn-secondary" id="back-home-btn">처음으로</button>
          </div>
          <div class="group">
            <button class="btn btn-secondary" id="print-btn">PDF 저장/인쇄</button>
            <button class="btn btn-danger" id="reset-result-btn">기록 초기화</button>
          </div>
        </div>
      `;
    }

    function bindResultEvents() {
      document.querySelectorAll('[data-note]').forEach(textarea => {
        textarea.addEventListener('input', event => updateNote(textarea.dataset.note, event.target.value));
      });
      document.getElementById('improvement-note').addEventListener('input', event => updateNote('improvement', event.target.value));
      document.getElementById('back-test-btn').onclick = backToTest;
      document.getElementById('back-home-btn').onclick = backToIntro;
      document.getElementById('print-btn').onclick = () => window.print();
      document.getElementById('reset-result-btn').onclick = clearAll;
    }

    function renderResult() {
      const result = calculateResults();
      const completion = Math.round((answeredCount() / totalQuestionCount()) * 100);

      DOM.app.innerHTML = `
        <section class="page">
          <div class="page-title">
            <div>
              <h2>검사 결과</h2>
              <p>영역별 점수, 자동 해석 피드백, 강점 3개, 보완점 3개, 권장 개선 질문</p>
            </div>
            <div class="chip">응답률 ${completion}%</div>
          </div>

          ${renderPrintSummary(result, completion)}
          ${renderResultHero(result, completion)}
          ${renderScoreSection(result)}
          ${renderAutoFeedbackSection(result)}

          <div class="result-grid" style="margin-top:18px;">
            ${renderReasonInputs('강점 3개와 그 이유', result.top3, 'top')}
            ${renderReasonInputs('보완점 3개와 그 이유', result.low3, 'low')}
          </div>

          ${renderRevisitSection(result)}
          ${renderResultFooter()}

          <div class="print-only helper center" style="margin-top:16px;">KCA 코치 역량 자기진단검사 결과 요약</div>
        </section>
      `;

      bindResultEvents();
    }

  </script>
</body>
</html>
