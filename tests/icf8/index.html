<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>DAILYCOACHING | ICF 핵심역량 기반 코치 자기진단검사</title>
  <style>
    :root {
      --bg: #f6fbff;
      --surface: #ffffff;
      --surface-soft: #f7fbff;
      --text: #17324d;
      --muted: #60788f;
      --line: #dbe8f4;
      --primary: #1f6fe5;
      --primary-soft: #eaf3ff;
      --accent: #f2c94c;
      --danger: #cf4f6c;
      --success: #1f6fe5;
      --agree: #1f6fe5;
      --agree-soft: #eaf3ff;
      --neutral: #9ca1af;
      --disagree: #d2a106;
      --disagree-soft: #fff7d6;
      --shadow: 0 18px 45px rgba(31, 86, 160, 0.14);
      --radius-lg: 24px;
      --radius-md: 18px;
      --radius-sm: 14px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: linear-gradient(180deg, #f6fbff 0%, #fff9e8 100%);
      color: var(--text);
      font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
    }

    body {
      min-height: 100vh;
    }

    .shell {
      max-width: 980px;
      margin: 0 auto;
      padding: 24px 16px 88px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      position: sticky;
      top: 0;
      z-index: 10;
      padding: 10px 0 14px;
      backdrop-filter: blur(10px);
      background: linear-gradient(180deg, rgba(246,251,255,0.96) 0%, rgba(255,249,232,0.88) 100%);
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 2px;
      line-height: 1.1;
    }

    .brand-main {
      font-weight: 900;
      letter-spacing: -0.02em;
      font-size: 1rem;
    }

    .brand-sub {
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 600;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(31, 111, 229, 0.10);
      color: var(--primary);
      font-size: 0.9rem;
      font-weight: 700;
      white-space: nowrap;
    }

    .card {
      background: var(--surface);
      border: 1px solid rgba(31, 111, 229, 0.10);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .hero {
      padding: 28px;
      display: grid;
      gap: 22px;
    }

    .hero h1, .page-title h2, .section-title h3 {
      margin: 0;
      letter-spacing: -0.03em;
    }

    .hero h1 {
      font-size: clamp(1.75rem, 3vw, 2.6rem);
      line-height: 1.15;
    }

    .hero p {
      margin: 0;
      color: var(--muted);
      font-size: 1rem;
    }

    .intro-kicker {
      display: inline-block;
      margin: 10px 0 0;
      color: var(--primary);
      font-size: 0.92rem;
      font-weight: 800;
      letter-spacing: -0.01em;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .mini-panel {
      background: var(--surface-soft);
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      padding: 16px;
    }

    .mini-panel strong {
      display: block;
      margin-bottom: 6px;
      font-size: 0.98rem;
    }

    .mini-panel span {
      color: var(--muted);
      font-size: 0.94rem;
    }

    .scale-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 10px;
    }

    .scale-item {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      padding: 14px 12px;
      text-align: center;
    }

    .scale-item b {
      display: block;
      font-size: 1rem;
      color: var(--primary);
      margin-bottom: 4px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    button {
      appearance: none;
      border: 0;
      cursor: pointer;
      font: inherit;
    }

    .btn {
      min-height: 48px;
      border-radius: 999px;
      padding: 0 18px;
      font-weight: 700;
      transition: transform 0.16s ease, box-shadow 0.16s ease, background 0.16s ease;
    }

    .btn:active {
      transform: translateY(1px);
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), #3d8bff);
      color: #fff;
      box-shadow: 0 14px 30px rgba(31, 111, 229, 0.24);
    }

    .btn-secondary {
      background: #fff;
      color: var(--text);
      border: 1px solid var(--line);
    }

    .btn-danger {
      background: #fff3f5;
      color: var(--danger);
      border: 1px solid #ffd4de;
    }

    .progress-wrap {
      padding: 18px 20px 0;
    }

    .progress-meta {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      color: var(--muted);
      font-size: 0.95rem;
      margin-bottom: 10px;
    }

    .progress-bar {
      height: 12px;
      background: #ddeafb;
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-value {
      height: 100%;
      background: linear-gradient(90deg, var(--primary), #5aa6ff);
      border-radius: inherit;
      transition: width 0.2s ease;
    }

    .page {
      padding: 20px;
    }

    .page-title {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 18px;
    }

    .page-title h2 {
      font-size: clamp(1.3rem, 2vw, 1.8rem);
    }

    .page-title p {
      margin: 4px 0 0;
      color: var(--muted);
    }

    .question-list {
      display: grid;
      gap: 14px;
    }

    .question-card {
      border: 1px solid #d8e5f3;
      border-radius: 26px;
      padding: 20px;
      background: linear-gradient(180deg, #ffffff 0%, #fffdf6 100%);
      scroll-margin-top: 120px;
      transition: border-color 0.18s ease, box-shadow 0.18s ease, transform 0.18s ease;
    }

    .question-card.is-complete {
      border-color: rgba(31, 111, 229, 0.18);
      box-shadow: 0 10px 22px rgba(31, 111, 229, 0.08);
    }

    .question-card.active-focus {
      border-color: rgba(31, 111, 229, 0.30);
      box-shadow: 0 0 0 4px rgba(31, 111, 229, 0.08), 0 12px 28px rgba(31, 111, 229, 0.10);
      transform: translateY(-1px);
    }

    .question-head {
      display: grid;
      gap: 12px;
      margin-bottom: 16px;
    }

    .question-head-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .question-number {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 38px;
      height: 38px;
      border-radius: 999px;
      background: var(--surface-soft);
      border: 1px solid var(--line);
      color: var(--primary);
      font-weight: 800;
      font-size: 0.98rem;
      transition: all 0.18s ease;
    }

    .question-card.is-complete .question-number {
      background: #eaf7f0;
      color: var(--success);
      border-color: rgba(31, 111, 229, 0.18);
    }

    .completion-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 10px;
      border-radius: 999px;
      background: #eef6ff;
      border: 1px solid #d9e7f4;
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 700;
    }

    .completion-badge.done {
      background: #eef8ff;
      border-color: #cfe2fb;
      color: var(--success);
    }

    .question-card h4 {
      margin: 0;
      font-size: 1.1rem;
      font-weight: 800;
      letter-spacing: -0.024em;
      line-height: 1.5;
    }

    .likert-wrap {
      display: grid;
      gap: 12px;
      padding: 14px;
      border-radius: 20px;
      background: #f8fbff;
      border: 1px solid #e2edf7;
    }

    .choice-row {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 14px;
    }

    .mobile-poles {
      display: none;
      justify-content: space-between;
      gap: 12px;
      font-size: 0.9rem;
      font-weight: 800;
    }

    .mobile-poles .agree { color: var(--agree); }
    .mobile-poles .disagree { color: var(--disagree); }

    .likert-side {
      font-size: 0.95rem;
      font-weight: 700;
      white-space: nowrap;
    }

    .likert-side.agree {
      color: var(--agree);
    }

    .likert-side.disagree {
      color: var(--disagree);
      text-align: right;
    }

    .choice-scale {
      min-width: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .choice-btn {
      appearance: none;
      border: 0;
      background: transparent;
      padding: 0;
      width: 56px;
      height: 56px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
      position: relative;
      transition: transform 0.15s ease, filter 0.15s ease, opacity 0.15s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .choice-btn:hover {
      transform: translateY(-1px) scale(1.02);
    }

    .choice-btn:focus-visible {
      outline: 3px solid rgba(31, 111, 229, 0.18);
      outline-offset: 3px;
    }

    .choice-btn::before {
      content: '';
      width: 100%;
      height: 100%;
      border-radius: 999px;
      border: 3px solid currentColor;
      background: #fff;
      box-sizing: border-box;
      transition: background 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease;
    }

    .choice-btn::after {
      content: '✓';
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 1rem;
      color: transparent;
      transition: color 0.15s ease, transform 0.15s ease;
      transform: scale(0.8);
    }

    .choice-btn.score-5,
    .choice-btn.score-4 {
      color: var(--agree);
    }

    .choice-btn.score-3 {
      color: var(--neutral);
    }

    .choice-btn.score-2,
    .choice-btn.score-1 {
      color: var(--disagree);
    }

    .choice-btn.score-5,
    .choice-btn.score-1 {
      width: 60px;
      height: 60px;
    }

    .choice-btn.score-4,
    .choice-btn.score-2 {
      width: 52px;
      height: 52px;
    }

    .choice-btn.score-3 {
      width: 42px;
      height: 42px;
    }

    .choice-btn.active.score-5::before,
    .choice-btn.active.score-4::before {
      background: var(--agree-soft);
      box-shadow: inset 0 0 0 10px currentColor, 0 8px 18px rgba(31, 111, 229, 0.18);
    }

    .choice-btn.active.score-3::before {
      background: #eff1f5;
      box-shadow: inset 0 0 0 7px currentColor, 0 8px 18px rgba(156, 161, 175, 0.18);
    }

    .choice-btn.active.score-2::before,
    .choice-btn.active.score-1::before {
      background: var(--disagree-soft);
      box-shadow: inset 0 0 0 10px currentColor, 0 8px 18px rgba(210, 161, 6, 0.22);
    }

    .choice-btn.active {
      transform: scale(1.05);
    }

    .choice-btn.active::after {
      color: #fff;
      transform: scale(1);
    }

    .choice-hint {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      color: #5f748a;
      font-size: 0.84rem;
      padding: 0 88px;
      font-weight: 700;
    }

    .choice-hint span {
      flex: 1;
      text-align: center;
      line-height: 1.25;
    }

    .footer-nav {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-top: 22px;
      flex-wrap: wrap;
    }

    .footer-nav .group {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
      margin-bottom: 18px;
    }

    .stat-box {
      background: var(--surface-soft);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px;
    }

    .stat-box small {
      color: var(--muted);
      display: block;
      margin-bottom: 8px;
    }

    .stat-box strong {
      font-size: 1.4rem;
      display: block;
      letter-spacing: -0.03em;
    }

    .result-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.15fr) minmax(0, 0.85fr);
      gap: 18px;
      align-items: start;
    }

    .section-card {
      border: 1px solid var(--line);
      border-radius: 22px;
      background: #fff;
      padding: 18px;
    }

    .section-title {
      margin-bottom: 14px;
    }

    .section-title h3 {
      font-size: 1.1rem;
    }

    .section-title p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 0.94rem;
    }

    .score-list {
      display: grid;
      gap: 10px;
    }

    .score-item {
      display: grid;
      grid-template-columns: minmax(0, 120px) minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
    }

    .score-item .label {
      font-weight: 700;
      font-size: 0.95rem;
    }

    .bar {
      width: 100%;
      height: 12px;
      background: #eee8fb;
      border-radius: 999px;
      overflow: hidden;
    }

    .bar > span {
      display: block;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #1f6fe5, #f2c94c);
    }

    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 12px;
      border-radius: 999px;
      background: var(--surface-soft);
      border: 1px solid var(--line);
      font-size: 0.93rem;
      font-weight: 700;
    }

    .tag.good { color: var(--success); }
    .tag.bad { color: var(--danger); }

    textarea {
      width: 100%;
      min-height: 92px;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      font: inherit;
      color: var(--text);
      background: #fff;
      resize: vertical;
    }

    .note-grid {
      display: grid;
      gap: 12px;
    }

    .note-item {
      background: #ffffff;
      border: 1px solid #dde9f4;
      border-radius: 18px;
      padding: 14px;
    }

    .note-item strong {
      display: block;
      margin-bottom: 8px;
    }

    .low-item-list {
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }

    .result-hero {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 18px;
      margin-bottom: 18px;
    }

    .metric-hero {
      border-radius: 24px;
      padding: 22px;
      background: linear-gradient(135deg, #1f6fe5 0%, #5aa6ff 66%, #f2c94c 100%);
      color: #fff;
      box-shadow: 0 20px 40px rgba(31, 86, 160, 0.20);
    }

    .metric-hero small {
      display: block;
      opacity: 0.82;
      margin-bottom: 8px;
    }

    .metric-hero strong {
      display: block;
      font-size: clamp(2rem, 5vw, 3rem);
      line-height: 1;
      letter-spacing: -0.04em;
      margin-bottom: 12px;
    }

    .metric-hero .sub {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .metric-hero .sub span {
      background: rgba(255,255,255,0.14);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 999px;
      padding: 8px 12px;
      font-weight: 700;
      font-size: 0.92rem;
    }

    .summary-card {
      background: #fff;
      border: 1px solid #dde9f4;
      border-radius: 24px;
      padding: 18px;
      display: grid;
      gap: 12px;
    }

    .summary-block {
      padding: 12px 14px;
      border-radius: 18px;
      background: #f8fbff;
      border: 1px solid #e2edf7;
    }

    .summary-block strong {
      display: block;
      margin-bottom: 6px;
      font-size: 0.95rem;
    }

    .revisit-stack {
      display: grid;
      gap: 14px;
      margin-top: 6px;
    }

    .revisit-card {
      padding: 16px;
      border-radius: 20px;
      border: 1px solid #dde9f4;
      background: #fffdf7;
    }

    .revisit-card h4 {
      margin: 0 0 6px;
      font-size: 1rem;
      letter-spacing: -0.02em;
    }

    .low-item {
      border-radius: 16px;
      background: #fff8df;
      border: 1px solid #ffe39a;
      padding: 12px 14px;
      font-size: 0.94rem;
    }

    .low-item b {
      color: var(--danger);
    }

    .prompt-list {
      display: grid;
      gap: 8px;
      margin-top: 12px;
    }

    .prompt-item {
      border-radius: 14px;
      background: #f7fbff;
      border: 1px solid #d7e6f3;
      padding: 12px 14px;
      font-size: 0.94rem;
      color: var(--text);
    }

    .prompt-item b {
      color: var(--primary);
    }

    .empty-state {
      padding: 18px;
      border-radius: 18px;
      background: #f8fbff;
      border: 1px dashed #c9d9f7;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .helper {
      color: var(--muted);
      font-size: 0.92rem;
    }


    .feedback-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin-top: 18px;
    }

    .feedback-card {
      border: 1px solid var(--line);
      border-radius: 20px;
      background: #fff;
      padding: 16px;
    }

    .feedback-card h4 {
      margin: 0 0 8px;
      font-size: 1rem;
      letter-spacing: -0.02em;
    }

    .feedback-card p {
      margin: 0;
      color: var(--muted);
      font-size: 0.94rem;
      line-height: 1.6;
    }

    .feedback-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 10px;
      padding: 7px 10px;
      border-radius: 999px;
      font-size: 0.82rem;
      font-weight: 800;
      border: 1px solid transparent;
    }

    .feedback-badge.strong {
      color: var(--success);
      background: #eef8ff;
      border-color: #cfe2fb;
    }

    .feedback-badge.stable {
      color: var(--primary);
      background: #f5f1ff;
      border-color: #dfd3fa;
    }

    .feedback-badge.focus {
      color: var(--danger);
      background: #fff4f7;
      border-color: #ffd6df;
    }

    .print-summary {
      display: none;
      margin-bottom: 18px;
      padding: 18px;
      border: 1px solid #d9d1ea;
      border-radius: 18px;
      background: #fff;
    }

    .print-summary h3 {
      margin: 0 0 8px;
      font-size: 1.2rem;
      letter-spacing: -0.03em;
    }

    .print-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 14px;
      color: #5e5872;
      font-size: 0.9rem;
      margin-bottom: 10px;
    }

    .print-summary p {
      margin: 0;
      color: #3e3558;
      font-size: 0.95rem;
      line-height: 1.6;
    }

    .hidden {
      display: none !important;
    }

    .center {
      text-align: center;
    }

    .print-only {
      display: none;
    }

    .svg-wrap {
      width: 100%;
      aspect-ratio: 1;
      border-radius: 22px;
      background: linear-gradient(180deg, #f7fbff 0%, #fffdf1 100%);
      border: 1px solid var(--line);
      padding: 10px;
    }

    .svg-wrap svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .hero-banner {
      border: 1px solid var(--line);
      border-radius: 28px;
      padding: 24px;
      background: linear-gradient(135deg, #eef6ff 0%, #fffdf0 100%);
      display: grid;
      gap: 18px;
    }

    .hero-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      width: fit-content;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(242, 201, 76, 0.2);
      color: #8f6a00;
      font-size: 0.86rem;
      font-weight: 800;
    }

    .hero-top {
      display: grid;
      grid-template-columns: minmax(0, 1.15fr) minmax(280px, 0.85fr);
      gap: 16px;
      align-items: stretch;
    }

    .hero-badge-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 16px;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 9px 12px;
      border-radius: 999px;
      background: #fff;
      border: 1px solid var(--line);
      color: var(--text);
      font-size: 0.9rem;
      font-weight: 700;
    }

    .hero-highlight {
      border-radius: 24px;
      padding: 20px;
      background: linear-gradient(135deg, #1f6fe5 0%, #57a0ff 70%, #f2c94c 100%);
      color: #fff;

    const DOM = {
      app: document.getElementById('app'),
      autosaveStatus: document.getElementById('autosave-status')
    };
    const state = loadState();

    render();

    function createDefaultNotes() {
      return NOTE_FIELDS.reduce((accumulator, field) => {
        accumulator[field] = '';
        return accumulator;
      }, {});
    }

    function defaultState() {
      return {
        screen: 'intro',
        sectionIndex: 0,
        answers: {},
        notes: createDefaultNotes()
      };
    }

    function loadState() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null');
        const base = getEmptyState();
        return saved ? { ...base, ...saved, notes: { ...base.notes, ...(saved.notes || {}) } } : base;
      } catch (error) {
        return getEmptyState();
      }
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      DOM.autosaveStatus.textContent = APP_COPY.autosaveDone;
      clearTimeout(saveState._t);
      saveState._t = setTimeout(() => {
        DOM.autosaveStatus.textContent = APP_COPY.autosaveOn;
      }, 1200);
    }

    function setState(patch) {
      Object.assign(state, patch);
      saveState();
      render();
    }

    function totalQuestionCount() {
      return FLAT_QUESTIONS.length;
    }

    function answeredCount() {
      return Object.keys(state.answers).length;
    }

    function getQuestionKey(categoryId, itemIndex) {
      return `${categoryId}-${itemIndex}`;
    }

    function getScoreToneLabel(score) {
      return SCORE_TONE_LABELS[score] || '';
    }

    // ==============================
    // User Actions
    // ==============================
    function updateAnswer(categoryId, itemIndex, value) {
      state.answers[getQuestionKey(categoryId, itemIndex)] = value;
      saveState();
      render();
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          scrollToNextQuestion(categoryId, itemIndex);
        });
      });
    }

    function clearAll() {
      if (!window.confirm('응답과 메모를 모두 지울까요?')) return;
      localStorage.removeItem(STORAGE_KEY);
      Object.assign(state, getEmptyState());
      render();
    }

    function startTest() {
      setState({ screen: 'test', sectionIndex: 0 });
    }

    function findFirstUnanswered() {
      for (let categoryIndex = 0; categoryIndex < CATEGORIES.length; categoryIndex += 1) {
        const category = CATEGORIES[categoryIndex];
        for (let itemIndex = 0; itemIndex < category.items.length; itemIndex += 1) {
          const key = getQuestionKey(category.id, itemIndex);
          if (!state.answers[key]) {
            return {
              categoryIndex,
              categoryId: category.id,
              itemIndex
            };
          }
        }
      }
      return null;
    }

    function focusQuestionCard(categoryId, itemIndex) {
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          const target = document.querySelector(`[data-question-card="${categoryId}-${itemIndex}"]`);
          if (!target) return;
          document.querySelectorAll('.question-card.active-focus').forEach(card => card.classList.remove('active-focus'));
          target.classList.add('active-focus');
          const rect = target.getBoundingClientRect();
          const currentScroll = window.pageYOffset || document.documentElement.scrollTop || 0;
          const desiredOffset = window.innerWidth <= 768
            ? Math.max(110, window.innerHeight * 0.28)
            : 132;
          const targetTop = rect.top + currentScroll - desiredOffset;
          window.scrollTo({ top: Math.max(0, targetTop), behavior: 'smooth' });
        });
      });
    }

    function goToMissingQuestion(missing, message) {
      if (message) window.alert(message);
      setState({ screen: 'test', sectionIndex: missing.categoryIndex });
      focusQuestionCard(missing.categoryId, missing.itemIndex);
    }

    function startOrResumeTest() {
      if (answeredCount() > 0) {
        const missing = findFirstUnanswered();
        if (missing) {
          setState({ screen: 'test', sectionIndex: missing.categoryIndex });
          focusQuestionCard(missing.categoryId, missing.itemIndex);
          return;
        }
        setState({ screen: 'test', sectionIndex: state.sectionIndex || 0 });
        return;
      }
      startTest();
    }

    function goSection(direction) {
      const nextIndex = state.sectionIndex + direction;
      if (nextIndex < 0 || nextIndex >= CATEGORIES.length) return;
      setState({ sectionIndex: nextIndex });
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function scrollToNextQuestion(categoryId, itemIndex) {
      if (state.screen !== 'test') return;
      const nextQuestion = document.querySelector(`[data-question-card="${categoryId}-${itemIndex + 1}"]`);
      const fallbackTarget = document.getElementById('next-btn') || document.getElementById('finish-btn');
      const target = nextQuestion || fallbackTarget;
      if (!target) return;

      document.querySelectorAll('.question-card.active-focus').forEach(card => card.classList.remove('active-focus'));
      if (nextQuestion) nextQuestion.classList.add('active-focus');

      const rect = target.getBoundingClientRect();
      const currentScroll = window.pageYOffset || document.documentElement.scrollTop || 0;
      const desiredOffset = window.innerWidth <= 768
        ? Math.max(110, window.innerHeight * 0.28)
        : 132;
      const targetTop = rect.top + currentScroll - desiredOffset;
      window.scrollTo({ top: Math.max(0, targetTop), behavior: 'smooth' });
    }

    function finishTest() {
      const missing = findFirstUnanswered();
      if (missing) {
        goToMissingQuestion(missing, '아직 응답하지 않은 문항이 있습니다. 누락된 첫 문항으로 이동합니다.');
        return;
      }
      setState({ screen: 'result' });
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function backToIntro() {
      setState({ screen: 'intro' });
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function backToTest() {
      setState({ screen: 'test' });
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // ==============================
    // Scoring / Results
    // ==============================
    function calculateResults() {
      const categories = CATEGORIES.map(category => {
        const itemDetails = category.items.map((text, index) => {
          const score = Number(state.answers[getQuestionKey(category.id, index)] || 0);
          return { index: index + 1, text, score };
        });
        const score = itemDetails.reduce((sum, item) => sum + item.score, 0);
        const lowItems = itemDetails.filter(item => item.score > 0 && item.score <= 2);
        const answeredItems = itemDetails.filter(item => item.score > 0);
        const lowestAnsweredScore = answeredItems.length
          ? Math.min(...answeredItems.map(item => item.score))
          : 0;
        const revisitItems = lowItems.length
          ? lowItems
          : answeredItems.filter(item => item.score === lowestAnsweredScore);
        const revisitMode = lowItems.length
          ? 'low-score'
          : answeredItems.length
            ? 'relative-low-score'
            : 'no-answer';

        return {
          id: category.id,
          group: category.group,
          name: category.name,
          description: category.description,
          score,
          average: Number((score / category.items.length).toFixed(2)),
          itemDetails,
          lowItems,
          lowestAnsweredScore,
          revisitItems,
          revisitMode
        };
      });

      const sortedDesc = [...categories].sort((a, b) => b.score - a.score || a.id - b.id);
      const sortedAsc = [...categories].sort((a, b) => a.score - b.score || a.id - b.id);
      const total = categories.reduce((sum, category) => sum + category.score, 0);
      return {
        categories,
        sortedDesc,
        sortedAsc,
        top3: sortedDesc.slice(0, 3),
        low3: sortedAsc.slice(0, 3),
        total,
        average: Number((total / totalQuestionCount()).toFixed(2))
      };
    }


    function getOverallBand(avg) {
      if (avg >= 4.3) return 'high';
      if (avg >= 3.7) return 'mid';
      return 'low';
    }

    function joinNames(items) {
      return items.map(item => item.name).join(', ');
    }

    function buildOverallSummary({ overallAverage, topCategories, lowCategories }) {
      const band = getOverallBand(overallAverage);
      const topNames = joinNames(topCategories.slice(0, 3));
      const lowNames = joinNames(lowCategories.slice(0, 3));
      const strongest = topCategories[0]?.name || '';
      const weakest = lowCategories[0]?.name || '';

      if (band === 'high') {
        return `현재 코칭은 전반적으로 안정적인 강점을 보입니다. 특히 ${topNames} 영역에서 비교적 뚜렷한 강점이 드러납니다. 반면 ${lowNames} 영역은 다음 성장 단계에서 더 의식적으로 점검하면 전체 균형이 한층 좋아질 수 있습니다.`;
      }
      if (band === 'mid') {
        return `현재 코칭은 전반적으로 균형을 갖추고 있습니다. 특히 ${topNames} 영역은 비교적 안정적으로 발휘되고 있으며, ${lowNames} 영역은 상황에 따라 편차가 나타날 수 있어 의도적인 연습과 점검이 도움이 됩니다.`;
      }
      return `현재 코칭은 몇몇 영역에서 분명한 잠재력을 보이지만, 실제 세션에서 일관되게 구현되기까지 더 구조적인 연습이 필요합니다. 특히 ${strongest} 영역은 현재의 강점으로 활용할 수 있고, ${weakest} 영역은 우선순위를 두고 보완하면 전체 흐름이 더 안정될 수 있습니다.`;
    }

    function buildGrowthFocus({ lowCategories }) {
      const first = lowCategories[0]?.name;
      const second = lowCategories[1]?.name;
      if (!first && !second) return '이번 결과는 현재의 강점과 성장 가능성을 함께 확인하는 출발점입니다.';
      if (first && second) return `이번 결과에서는 특히 ${first}와 ${second} 영역을 다음 성장 우선순위로 두는 것이 좋습니다.`;
      return `이번 결과에서는 특히 ${first} 영역을 다음 성장 우선순위로 두는 것이 좋습니다.`;
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function renderRadar(categories) {
      const size = 520;
      const center = size / 2;
      const radius = 175;
      const steps = RADAR_STEPS;
      const maxScore = CATEGORY_MAX_SCORE;

      const labels = categories.map(category => category.name);
      const points = categories.map((category, index) => {
        const angle = (-Math.PI / 2) + (Math.PI * 2 * index / categories.length);
        const valueRadius = radius * (category.score / maxScore);
        return {
          x: center + Math.cos(angle) * valueRadius,
          y: center + Math.sin(angle) * valueRadius,
          angle,
          labelX: center + Math.cos(angle) * (radius + 32),
          labelY: center + Math.sin(angle) * (radius + 32),
          label: labels[index]
        };
      });

      const polygonPoints = points.map(point => `${point.x},${point.y}`).join(' ');

      const rings = Array.from({ length: steps }, (_, index) => {
        const ringRadius = radius * ((index + 1) / steps);
        const ringPoints = categories.map((_, itemIndex) => {
          const angle = (-Math.PI / 2) + (Math.PI * 2 * itemIndex / categories.length);
          return `${center + Math.cos(angle) * ringRadius},${center + Math.sin(angle) * ringRadius}`;
        }).join(' ');
        return `<polygon points="${ringPoints}" fill="none" stroke="#d7e6f3" stroke-width="1"></polygon>`;
      }).join('');

      const axes = categories.map((_, index) => {
        const angle = (-Math.PI / 2) + (Math.PI * 2 * index / categories.length);
        return `<line x1="${center}" y1="${center}" x2="${center + Math.cos(angle) * radius}" y2="${center + Math.sin(angle) * radius}" stroke="#d7e6f3" stroke-width="1"></line>`;
      }).join('');

      const labelsSvg = points.map(point => `
        <text x="${point.labelX}" y="${point.labelY}" font-size="15" font-weight="700" fill="#5f748a" text-anchor="middle" dominant-baseline="middle">${escapeHtml(point.label)}</text>
      `).join('');

      const ticks = Array.from({ length: steps }, (_, index) => {
        const value = (maxScore / steps) * (index + 1);
        const y = center - (radius * ((index + 1) / steps));
        return `<text x="${center + 6}" y="${y - 4}" font-size="11" fill="#6a8298">${value}</text>`;
      }).join('');

      return `
        <svg viewBox="0 0 ${size} ${size}" role="img" aria-label="영역별 점수 레이더 차트">
          ${rings}
          ${axes}
          <polygon points="${polygonPoints}" fill="rgba(31, 111, 229, 0.16)" stroke="#1f6fe5" stroke-width="3"></polygon>
          ${points.map(point => `<circle cx="${point.x}" cy="${point.y}" r="4" fill="#1f6fe5"></circle>`).join('')}
          ${labelsSvg}
          ${ticks}
        </svg>
      `;
    }

      `;
    }

    function renderRevisitCard(category) {
      return `
        <div class="revisit-card">
          <h4>${category.name}</h4>
          ${category.revisitMode === 'low-score'
            ? `<div class="helper" style="margin-bottom:10px;">이 역량에서 1점 또는 2점으로 응답한 문항입니다.</div>`
            : category.revisitMode === 'relative-low-score'
              ? `<div class="helper" style="margin-bottom:10px;">1점 또는 2점 문항은 없어서, 이 역량에서 가장 낮게 응답한 ${category.lowestAnsweredScore}점 문항을 보여드립니다.</div>`
              : '<div class="empty-state">아직 이 역량에 응답한 문항이 없습니다.</div>'}
          ${category.revisitMode !== 'no-answer'
            ? `<div class="low-item-list">${category.revisitItems.map(item => `
                <div class="low-item"><b>${item.score}점</b> · ${item.index}. ${item.text}</div>
              `).join('')}</div>`
            : ''}
          ${renderPromptList(category.id)}
        </div>
      `;
    }

    function renderRevisitSection(result) {
      return `
        <div class="section-card" style="margin-top:18px;">
          <div class="section-title">
            <h3>${RESULT_COPY.promptTitle}</h3>
            <p>${RESULT_HELPERS.prompts}</p>
          </div>
          <div class="revisit-stack">
            ${result.low3.map(category => renderRevisitCard(category)).join('')}
          </div>

          <div class="note-item" style="margin-top:14px;">
            <strong>${RESULT_COPY.notesTitle}</strong>
            <textarea id="improvement-note" placeholder="다음 세션 전까지 실천해볼 구체적인 개발 행동을 적어보세요.">${escapeHtml(state.notes.improvement || '')}</textarea>
          </div>
        </div>
      `;
    }

    function getFeedbackTone(category) {
      if (category.average >= 4.2) return 'strong';
      if (category.average >= 3.2) return 'stable';
      return 'focus';
    }

    function renderAutoFeedbackSection(result) {
      return `
        <div class="section-card" style="margin-top:18px;">
          <div class="section-title">
            <h3>${RESULT_COPY.feedbackTitle}</h3>
            <p>${RESULT_HELPERS.feedback}</p>
          </div>
          <div class="feedback-grid">
            ${result.categories.map(renderAutoFeedbackCard).join('')}
          </div>
        </div>
      `;
    }

    function renderAutoFeedbackCard(category) {
      const tone = getFeedbackTone(category);
      const feedback = AUTO_FEEDBACK[category.id]?.[tone] || '';
      return `
        <div class="feedback-card">
          <div class="feedback-badge ${tone}">${FEEDBACK_TONE[tone]}</div>
          <h4>${category.group} · ${category.name}</h4>
          <p>${feedback}</p>
        </div>
      `;
    }

    function renderPrintSummary(result, completion) {
      const printedAt = new Date().toLocaleString('ko-KR', {
        year: 'numeric',
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit'
      });
      const strongest = result.top3[0];
      const weakest = result.low3[0];
      return `
        <div class="print-summary print-only">
          <h3>ICF 핵심역량 자기진단 결과 요약</h3>
          <div class="print-meta">
            <span>출력 일시 ${printedAt}</span>
            <span>총점 ${result.total}점</span>
            <span>문항 평균 ${result.average}점</span>
            <span>응답률 ${completion}%</span>
          </div>
          <p>현재 결과에서 가장 두드러진 강점은 <b>${strongest ? strongest.name : '-'}</b>이며, 우선 보완이 필요한 영역은 <b>${weakest ? weakest.name : '-'}</b>입니다. 아래 출력물은 현재 응답을 바탕으로 한 ICF 핵심역량 자기진단 결과 요약입니다.</p>
        </div>
      `;
    }

    function renderResultFooter() {
      return `
        <div class="footer-nav no-print">
          <div class="group">
            <button class="btn btn-secondary" id="back-test-btn">검사 화면으로</button>
            <button class="btn btn-secondary" id="back-home-btn">처음으로</button>
          </div>
          <div class="group">
            <button class="btn btn-secondary" id="print-btn">${RESULT_COPY.printLabel}</button>
            <button class="btn btn-danger" id="reset-result-btn">기록 초기화</button>
          </div>
        </div>
      `;
    }

    function bindResultEvents() {
      document.querySelectorAll('[data-note]').forEach(textarea => {
        textarea.addEventListener('input', event => updateNote(textarea.dataset.note, event.target.value));
      });
      document.getElementById('improvement-note').addEventListener('input', event => updateNote('improvement', event.target.value));
      document.getElementById('back-test-btn').onclick = backToTest;
      document.getElementById('back-home-btn').onclick = backToIntro;
      document.getElementById('print-btn').onclick = () => window.print();
      document.getElementById('reset-result-btn').onclick = clearAll;
    }

    function renderResult() {
      const result = calculateResults();
      const completion = Math.round((answeredCount() / totalQuestionCount()) * 100);

      DOM.app.innerHTML = `
        <section class="page">
          <div class="page-title">
            <div>
              <h2>${RESULT_COPY.pageTitle}</h2>
              <p>${RESULT_COPY.pageSubtitle}</p>
            </div>
            <div class="chip">응답률 ${completion}%</div>
          </div>

          ${renderPrintSummary(result, completion)}
          ${renderResultHero(result, completion)}
          ${renderScoreSection(result)}
          ${renderAutoFeedbackSection(result)}

          <div class="result-grid" style="margin-top:18px;">
            ${renderReasonInputs('강점 3개와 그 이유', result.top3, 'top')}
            ${renderReasonInputs('보완점 3개와 그 이유', result.low3, 'low')}
          </div>

          ${renderRevisitSection(result)}
          ${renderResultFooter()}

          <div class="print-only helper center" style="margin-top:16px;">ICF 핵심역량 자기진단 결과 요약</div>
        </section>
      `;

      bindResultEvents();
    }

  </script>
</body>
</html>
